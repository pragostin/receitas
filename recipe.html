<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receita</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Receitas">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#1a1a2e">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand:       #f5ede0;
      --terracotta: #c4663a;
      --ink:        #1a1a2e;
      --cream:      #fdf8f2;
      --paper:      #ffffff;
      --muted:      #8a7f74;
      --border:     #e6dccc;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── HERO ─────────────────────────────────── */
    .hero {
      background: var(--ink);
      color: var(--sand);
      padding: 28px 32px 48px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 85% 15%, rgba(196,102,58,.28) 0%, transparent 55%),
        radial-gradient(ellipse at 10% 90%, rgba(196,102,58,.12) 0%, transparent 50%);
      pointer-events: none;
    }
    .hero-inner { position: relative; max-width: 880px; margin: 0 auto; }

    .hero-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px;
    }

    .back-link {
      display: inline-flex; align-items: center; gap: 7px;
      color: #b0a898; text-decoration: none;
      font-family: 'Space Mono', monospace;
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
      transition: color .18s;
    }
    .back-link:hover { color: var(--sand); }
    .back-link svg {
      width: 14px; height: 14px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .share-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18);
      color: #d0c8be; border-radius: 20px;
      padding: 6px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; transition: background .18s, color .18s;
      -webkit-tap-highlight-color: transparent;
    }
    .share-btn:hover { background: rgba(255,255,255,0.18); color: var(--sand); }
    .share-btn svg {
      width: 13px; height: 13px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .recipe-header { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 14px; }
    .recipe-emoji { font-size: 56px; line-height: 1; flex-shrink: 0; }
    .recipe-title-block { flex: 1; }

    .recipe-cat {
      font-family: 'Space Mono', monospace;
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--terracotta); margin-bottom: 8px;
    }

    .recipe-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.1; font-weight: 700;
      color: var(--sand);
    }

    .recipe-desc {
      font-size: 14px; color: #b0a898;
      line-height: 1.7; margin: 14px 0 22px;
      max-width: 520px;
    }

    .meta-pills { display: flex; gap: 10px; flex-wrap: wrap; }
    .meta-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 14px; border-radius: 24px;
      border: 1px solid rgba(230,220,204,.25);
      background: rgba(255,255,255,.06);
      font-size: 13px; color: #d4c8b8; line-height: 1;
    }
    .meta-pill svg {
      width: 13px; height: 13px;
      stroke: var(--terracotta); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* ── CONTENT (two-column) ─────────────────── */
    .recipe-content {
      max-width: 880px; margin: 0 auto;
      padding: 40px 32px 56px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 40px;
      align-items: start;
    }

    /* ── INGREDIENTS ─────────────────────────── */
    .ingredients-col {
      position: sticky;
      top: 28px;
    }

    .col-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 18px;
    }

    .group-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--terracotta);
      margin: 20px 0 10px;
    }
    .group-title:first-child { margin-top: 0; }

    .ingredient {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: opacity .2s;
      user-select: none;
    }
    .ingredient:last-child { border-bottom: none; }
    .ingredient::before {
      content: '·';
      color: var(--terracotta);
      font-size: 20px;
      line-height: 1;
      flex-shrink: 0;
      margin-top: -2px;
    }
    .ingredient span {
      font-size: 14px; color: #2a2a3a; line-height: 1.5;
    }
    .ingredient.done {
      opacity: .32;
    }
    .ingredient.done span {
      text-decoration: line-through;
      text-decoration-color: var(--muted);
    }

    /* ── STEPS ───────────────────────────────── */
    .steps-col {}

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px; font-weight: 700;
      color: var(--ink);
      margin: 32px 0 18px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
    }
    .section-title:first-child { margin-top: 0; }

    .step {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 16px;
      margin-bottom: 22px;
      align-items: start;
      cursor: pointer;
      transition: opacity .2s;
      user-select: none;
    }
    .step-num {
      font-family: 'Space Mono', monospace;
      font-size: 22px; font-weight: 700;
      color: var(--terracotta); opacity: .5;
      line-height: 1.3;
    }
    .step-text {
      font-size: 15px; line-height: 1.72;
      color: #2a2a3a; padding-top: 4px;
    }
    .step.done .step-num { opacity: .2; }
    .step.done .step-text {
      opacity: .35;
      text-decoration: line-through;
      text-decoration-color: var(--muted);
    }

    /* ── TIP BAR ──────────────────────────────── */
    .tip-bar {
      margin-top: 36px;
      padding: 14px 16px;
      background: var(--sand);
      border-left: 3px solid var(--terracotta);
      border-radius: 0 8px 8px 0;
      font-size: 12px; color: var(--muted);
      font-family: 'Space Mono', monospace;
      line-height: 1.6;
    }

    /* ── ERROR ───────────────────────────────── */
    .error {
      max-width: 880px; margin: 80px auto;
      padding: 0 32px;
      text-align: center; color: var(--muted);
    }
    .error a { color: var(--terracotta); text-decoration: none; }

    /* ── RESPONSIVE ──────────────────────────── */
    @media (max-width: 720px) {
      .hero { padding: 22px 18px 36px; }
      .recipe-header { flex-direction: column; gap: 12px; }
      .recipe-emoji { font-size: 48px; }
      .recipe-content {
        grid-template-columns: 1fr;
        padding: 28px 16px 48px;
        gap: 36px;
      }
      .ingredients-col { position: static; }
      .step { grid-template-columns: 36px 1fr; }
      .step-num { font-size: 18px; }
    }
  </style>
</head>
<body>

<div id="app"></div>

<script>
const params = new URLSearchParams(location.search);
const id = params.get('id');

function iconClock() {
  return `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>`;
}
function iconThermo() {
  return `<svg viewBox="0 0 24 24"><path d="M14 14.76V4a2 2 0 0 0-4 0v10.76a4 4 0 1 0 4 0z"/></svg>`;
}
function iconStar() {
  return `<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
}
function iconBack() {
  return `<svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>`;
}

function renderIngredients(ingredients) {
  return ingredients.map(group => {
    const groupTitle = group.group ? `<div class="group-title">${group.group}</div>` : '';
    const items = group.items.map(item =>
      `<div class="ingredient"><span>${item}</span></div>`
    ).join('');
    return groupTitle + items;
  }).join('');
}

function renderSteps(steps) {
  let html = '';
  let globalNum = 1;
  steps.forEach(section => {
    if (section.section) {
      html += `<div class="section-title">${section.section}</div>`;
    }
    section.instructions.forEach(instruction => {
      const num = String(globalNum).padStart(2, '0');
      html += `
        <div class="step">
          <div class="step-num">${num}</div>
          <div class="step-text">${instruction}</div>
        </div>
      `;
      globalNum++;
    });
  });
  return html;
}

function render(r) {
  document.title = `${r.title} · Receitas`;

  const html = `
    <header class="hero">
      <div class="hero-inner">
        <div class="hero-nav">
          <a class="back-link" href="index.html">${iconBack()} Receitas</a>
          <button class="share-btn" onclick="shareRecipe('${r.title}')">
            <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
            Partilhar
          </button>
        </div>
        <div class="recipe-header">
          <div class="recipe-emoji">${r.emoji}</div>
          <div class="recipe-title-block">
            <div class="recipe-cat">${r.category}</div>
            <h1 class="recipe-title">${r.title}</h1>
          </div>
        </div>
        <p class="recipe-desc">${r.description}</p>
        <div class="meta-pills">
          <span class="meta-pill">${iconClock()} ${r.time}</span>
          <span class="meta-pill">${iconThermo()} ${r.oven_temp}</span>
          <span class="meta-pill">${iconStar()} ${r.difficulty}</span>
        </div>
      </div>
    </header>

    <div class="recipe-content">
      <aside class="ingredients-col">
        <div class="col-label">Ingredientes</div>
        ${renderIngredients(r.ingredients)}
        <div class="tip-bar">Toque em um ingrediente para marcá-lo como separado.</div>
      </aside>
      <section class="steps-col">
        <div class="col-label">Modo de Preparo</div>
        ${renderSteps(r.steps)}
      </section>
    </div>
  `;

  document.getElementById('app').innerHTML = html;

  // Toggle done on tap
  document.querySelectorAll('.ingredient, .step').forEach(el => {
    el.addEventListener('click', () => el.classList.toggle('done'));
  });
}

function renderError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="error">
      <p style="font-size:48px;margin-bottom:16px">🍴</p>
      <p style="font-size:18px;margin-bottom:8px">${msg}</p>
      <p><a href="index.html">← Voltar às receitas</a></p>
    </div>
  `;
}

function shareRecipe(title) {
  if (navigator.share) {
    navigator.share({ title: title, url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href).then(() => {
      alert('Link copiado!');
    });
  }
}

async function load() {
  if (!id) { renderError('Receita não especificada.'); return; }
  try {
    const res = await fetch(`recipes/${id}.json`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    render(data);
  } catch {
    renderError('Receita não encontrada.');
  }
}

load();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>

</body>
</html>
